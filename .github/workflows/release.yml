name: Release
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
env:
  ZIG_VERSION: "0.16.0"
jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux-gnu
            runner: ubuntu-latest
            os_arch: linux-x86_64
          - target: aarch64-linux-gnu
            runner: ubuntu-latest
            os_arch: linux-aarch64
          - target: riscv64-linux-gnu
            runner: ubuntu-latest
            os_arch: linux-riscv64
            binary: libregrex.so
          - target: x86_64-macos
            runner: macos-15-intel
            os_arch: macos-x86_64
          - target: aarch64-macos
            runner: macos-latest
            os_arch: macos-aarch64
          - target: x86_64-windows-gnu
            runner: windows-latest
            os_arch: windows-x86_64
          - target: aarch64-windows-gnu
            runner: windows-latest
            os_arch: windows-aarch64

    steps:
        - uses: actions/checkout@v4

        - name: Extract version (POSIX)
          if: ${{ !contains(matrix.target, 'windows') }}
          id: pre_version
          run: |
            TAG=${{ github.ref_name }}
            VERSION=${TAG#v}
            echo "VERSION=$VERSION" >> $GITHUB_ENV

        - name: Extract version (Windows)
          if: ${{ contains(matrix.target, 'windows') }}
          id: pre_version
          run: |
            $tag = {{ github.ref_name }}
            $version = $tag.Substring(1, $tag.Length)
            "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

        - name: Install Zig
          uses: mlugg/setup-zig@v2
          with:
            version: ${{ env.ZIG_VERSION }}

        - name: Build (POSIX)
          if: ${{ !contains(matrix.target, 'windows') }}
          run: |
            zig build --prefix dist \
              -Dtarget=${{ matrix.target }} \
              -Doptimize=ReleaseSafe
            cp LICENSE README.md dist/

        - name: Package (POSIX)
          if: ${{ !contains(matrix.target, 'windows') }}
          run: |
            OUT=libregrex${{ env.VERSION }}-${{ matrix.os_arch }}
            cd dist
            tar -czf "${OUT}.tar.gz" \
              lib \
              include \
              share \
              LICENSE README.md
            echo "OUT_FILE=$OUT" >> $GITHUB_ENV

        - name: Build (Windows)
          if: ${{ contains(matrix.target, 'windows') }}
          run: |
            zig build --prefix dist `
              -Dtarget=${{ matrix.target }} `
              -Doptimize=ReleaseSafe
            Copy-Item -Path "LICENSE", "README.md" -Destination "dist" -Force

        - name: Package (Windows)
          if: ${{ contains(matrix.target, 'windows') }}
          run: |
            $outFile = "regrex${{ env.VERSION }}-${{ matrix.os_arch }}"
            cd dist
            $compress = @{
              Path = "bin", `
                "lib", `
                "include", 
                "LICENSE", `
                "README.md"
              CompressionLevel = "Optimal"
              DestinationPath = "$($outFile).zip"
            }
            Compress-Archive @compress
            "OUT_FILE=$outFile" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

        - name: Upload artifact
          uses: actions/upload-artifact@v4
          with:
            name: ${{ env.OUT_FILE }}
            path: dist/

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.zip | tee checksums.txt

      - name: Create Release  
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
