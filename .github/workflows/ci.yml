name: CI
on:
  push:
    branches:
      - master
    pull_request:
      branches:
        - master
jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          version: "0.16.0"
      - name: Build
        run: zig build
      - name: Test
        run: zig build test --summary all --verbose
